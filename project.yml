name: Readr
options:
  bundleIdPrefix: com.readr
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    INFOPLIST_KEY_NSCameraUsageDescription: "Readr needs camera access to scan book pages"
    INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Readr needs photo library access to import book page images"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    CODE_SIGN_STYLE: Automatic
    PRODUCT_BUNDLE_IDENTIFIER: com.readr.app
    SWIFT_EMIT_LOC_STRINGS: YES
    ENABLE_PREVIEWS: YES

targets:
  Readr:
    type: application
    platform: iOS
    sources:
      - path: Sources
        type: group
      - path: Resources
        type: group
    settings:
      base:
        PRODUCT_NAME: Readr
        INFOPLIST_KEY_CFBundleDisplayName: Readr
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Sources/App/Readr.entitlements
    dependencies:
      - package: SQLite.swift
        product: SQLite
      - target: ReadrWidgetExtension
    postCompileScripts: []

  ReadrWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ReadrWidget
        type: group
    settings:
      base:
        PRODUCT_NAME: ReadrWidgetExtension
        INFOPLIST_KEY_CFBundleDisplayName: Readr Widget
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: com.apple.widgetkit-extension
        CODE_SIGN_ENTITLEMENTS: ReadrWidget/ReadrWidget.entitlements
        SKIP_INSTALL: YES
        ASSETCATALOG_COMPILER_WIDGET_BACKGROUND_COLOR_NAME: WidgetBackground
        GENERATE_INFOPLIST_FILE: YES
    dependencies: []

packages:
  SQLite.swift:
    url: https://github.com/stephencelis/SQLite.swift
    version: 0.16.0

schemes:
  Readr:
    build:
      targets:
        Readr: all
        ReadrWidgetExtension: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
